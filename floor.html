<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hệ thống Tòa nhà Interactive PRO | Ngự Tâm Holdings</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --bg-dark: #050507;
            --bg-panel: rgba(15, 12, 12, 0.75);
            --accent-gold: #D4AF37;
            --text-main: #e0e0e0;
            --glow-gold: 0 0 20px rgba(212, 175, 55, 0.4);
            --gradient-ai: linear-gradient(135deg, #D4AF37 0%, #ffdf73 50%, #D4AF37 100%);
        }

        /* --- GLOBAL --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                radial-gradient(circle at top left, rgba(139,0,0,0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom right, rgba(212,175,55,0.1) 0%, transparent 40%);
            background-size: 30px 30px, 30px 30px, 100% 100%, 100% 100%;
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Quan trọng cho Mobile */
        }

        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }

        /* --- LAYOUT CHÍNH --- */
        .container {
            display: flex;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            gap: 15px;
        }

        /* --- CỘT TRÁI (TÒA NHÀ) --- */
        .left {
            width: 35%;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .hud-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(212,175,55,0.15), transparent);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hud-header i { font-size: 14px; animation: blink 2s infinite; }

        .image-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .scanner-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent-gold);
            box-shadow: 0 0 20px 8px rgba(212, 175, 55, 0.4);
            opacity: 0.8;
            z-index: 5;
            pointer-events: none;
            animation: scan 3.5s ease-in-out infinite alternate;
        }

        .left img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            display: block;
            border-radius: 8px;
            z-index: 2;
        }

        area { cursor: pointer; outline: none; }

        .instruction-badge {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 5, 7, 0.85);
            backdrop-filter: blur(10px);
            color: var(--accent-gold);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: var(--glow-gold);
            pointer-events: none;
            z-index: 10;
            animation: float 3s ease-in-out infinite;
            white-space: nowrap;
        }

        /* --- CỘT PHẢI (HIỂN THỊ WEB) --- */
        .right {
            width: 65%;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Dùng Flexbox để tách biệt Header và Iframe */
            display: flex;
            flex-direction: column;
        }

        /* TRẠNG THÁI FULLSCREEN */
        .right.full {
            position: fixed;
            top: 0; left: 0;
            width: 100vw !important;
            height: 100vh !important;
            height: 100dvh !important;
            border-radius: 0;
            border: none;
            z-index: 99999;
            padding: 0;
            margin: 0;
        }

        /* --- THANH CÔNG CỤ (NẰM NGOÀI IFRAME) --- */
        .right-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(10, 10, 12, 0.95);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 10;
        }

        /* Xử lý khoảng trống tai thỏ (notch) trên iPhone khi Fullscreen */
        .right.full .right-header {
            padding-top: max(10px, env(safe-area-inset-top));
            padding-left: max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
        }

        .right-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Nút Icon Tròn */
        .btn-icon {
            background: transparent;
            color: var(--text-main);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        
        .btn-icon:hover, .btn-icon:active {
            background: var(--gradient-ai);
            color: #111;
            border-color: transparent;
            box-shadow: var(--glow-gold);
            transform: scale(1.05);
        }

        /* --- VÙNG BỌC IFRAME (BÊN DƯỚI THANH CÔNG CỤ) --- */
        .iframe-container {
            flex: 1; /* Tự động lấy hết chiều cao còn lại */
            position: relative;
            width: 100%;
            background: #fff; /* Bắt buộc nền trắng cho web */
        }

        /* --- MÀN HÌNH CHỜ --- */
        .placeholder {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle, rgba(20,20,25,0.95) 0%, var(--bg-dark) 100%);
            z-index: 10;
            transition: opacity 0.6s ease;
        }
        
        .placeholder-icon {
            font-size: 4rem;
            color: transparent;
            background: var(--gradient-ai);
            -webkit-background-clip: text;
            background-clip: text;
            margin-bottom: 20px;
            animation: pulse-icon 2s infinite alternate;
        }

        .placeholder h2 { margin: 0 0 10px 0; font-size: 1.5rem; color: #fff; letter-spacing: 2px; }
        .placeholder p { color: rgba(255,255,255,0.6); font-size: 13px; max-width: 80%; line-height: 1.5; }

        /* LOADER */
        .iframe-loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 8;
            display: none;
        }

        /* --- KHUNG IFRAME --- */
        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0; 
            transition: opacity 0.8s ease-in-out;
            z-index: 9;
        }
        iframe.loaded {
            opacity: 1;
        }

        /* --- ANIMATIONS --- */
        @keyframes scan { 0% { top: 5%; opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { top: 95%; opacity: 0; } }
        @keyframes float { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -8px); box-shadow: 0 10px 20px rgba(212,175,55,0.5); } }
        @keyframes pulse-icon { 0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); } 100% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(212,175,55,0.8)); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* --- RESPONSIVE MOBILE --- */
        @media(max-width: 768px) {
            .container { flex-direction: column; padding: 10px; gap: 10px; }
            .left { width: 100%; flex: 0 0 40dvh; }
            .right { width: 100%; flex: 1; }
            
            .right-header { padding: 10px 15px; }
            .right-title { font-size: 11px; }
            .btn-icon { width: 32px; height: 32px; font-size: 13px; }
        }
    </style>
  </head>
  <body>

    <div class="container">

      <div class="left" id="leftBox">
        <div class="hud-header">
          <i class="fas fa-circle" style="color: #10b981;"></i> NGỰ TÂM TOWER
        </div>

        <div class="image-wrapper">
          <div class="scanner-line"></div>
          <img id="buildingImg" src="../1.jpeg" usemap="#building" alt="Ngu Tam Tower">
          <div class="instruction-badge"><i class="fas fa-crosshairs"></i> CHẠM TẦNG ĐỂ TRUY CẬP</div>
        </div>

        <map name="building">
          <area shape="rect" coords="146,680,737,852" onclick="loadFloor('https://a90b-14-248-228-25.ngrok-free.app/ngutam/upload/index.php')" href="#" title="Tầng 1 - Ngự Mộc Market">
          <area shape="rect" coords="160,660,732,601" onclick="loadFloor('#')" href="#" title="Tầng 2 - Ngự Tâm thiền trà">
          <area shape="rect" coords="154,524,732,586" onclick="loadFloor('https://tramxonghanhphuc.net')" href="#" title="Tầng 3 - Ngự Tâm Spa">
          <area shape="rect" coords="155,444,734,506" onclick="loadFloor('https://legatalk.io.vn')" href="#" title="Tầng 4 - Ngự Tâm Academy">
          <area shape="rect" coords="156,357,733,430" onclick="loadFloor('#')" href="#" title="Tầng 5 - Ngự Tâm Travel & Living">
          <area shape="rect" coords="156,278,734,333" onclick="loadFloor('#')" href="#" title="Tầng 6 - Ngự Tâm Mobility & Logistic">
          <area shape="rect" coords="154,173,734,258" onclick="loadFloor('https://a90b-14-248-228-25.ngrok-free.app/course/wordpress/')" href="#" title="Tầng 7 - Ngự Tâm Media & Technology">
        </map>
      </div>

      <div class="right" id="rightBox">
        
        <div class="right-header">
            <div class="right-title"><i class="fas fa-satellite-dish"></i> KHÔNG GIAN KẾT NỐI</div>
            <button class="btn-icon" id="fullBtn" onclick="toggleFull()" title="Phóng to/Thu nhỏ">
                <i class="fas fa-expand"></i>
            </button>
        </div>

        <div class="iframe-container">
            <div class="iframe-loader" id="iframeLoader"></div>

            <div class="placeholder" id="placeholder">
                <i class="fas fa-fingerprint placeholder-icon"></i>
                <h2>Hệ thống chờ lệnh</h2>
                <p>Tương tác với mô hình tháp để truy xuất dữ liệu.</p>
            </div>

            <iframe id="viewer"
                allow="camera *; microphone *; display-capture *; fullscreen *; clipboard-read; clipboard-write; autoplay; web-share"
                sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-top-navigation-by-user-activation allow-downloads">
            </iframe>
        </div>

      </div>

    </div>

    <script>
    let isFull = false;

    function loadFloor(url) {
        event.preventDefault();

        if(url === "#") {
            alert("Tầng này hiện chưa được thiết lập dữ liệu kết nối!");
            return;
        }
        
        const placeholder = document.getElementById("placeholder");
        const viewer = document.getElementById("viewer");
        const loader = document.getElementById("iframeLoader");
        
        // Auto Fullscreen trên Điện thoại
        if (window.innerWidth <= 768 && !isFull) {
            toggleFull();
        }

        placeholder.style.opacity = "0";
        loader.style.display = "block";
        viewer.classList.remove("loaded");

        setTimeout(() => {
            placeholder.style.display = "none";
            viewer.src = url;
            viewer.onload = function() {
                loader.style.display = "none";
                viewer.classList.add("loaded");
            };
        }, 500);
    }

    function toggleFull() {
        const right = document.getElementById("rightBox");
        const btn = document.getElementById("fullBtn");

        isFull = !isFull;

        if(isFull) {
            right.classList.add("full");
            // Đổi biểu tượng thành Thu nhỏ
            btn.innerHTML = '<i class="fas fa-compress"></i>';
            setTimeout(resizeMap, 300);
        } else {
            right.classList.remove("full");
            // Đổi biểu tượng thành Phóng to
            btn.innerHTML = '<i class="fas fa-expand"></i>';
            setTimeout(resizeMap, 300);
        }
    }

    function resizeMap() {
        const img = document.getElementById("buildingImg");
        const areas = document.querySelectorAll("area");

        if (!img.naturalWidth) return;

        const naturalWidth = img.naturalWidth;
        const naturalHeight = img.naturalHeight;
        const currentWidth = img.clientWidth;
        const currentHeight = img.clientHeight;

        const scaleX = currentWidth / naturalWidth;
        const scaleY = currentHeight / naturalHeight;

        areas.forEach(area => {
            if(!area.dataset.originalCoords){
                area.dataset.originalCoords = area.coords;
            }

            const coords = area.dataset.originalCoords.split(",");
            const newCoords = coords.map((coord, i) => {
                return i % 2 === 0 
                    ? Math.round(coord * scaleX) 
                    : Math.round(coord * scaleY);
            });

            area.coords = newCoords.join(",");
        });
    }

    document.getElementById("buildingImg").addEventListener('load', resizeMap);
    window.addEventListener("resize", () => {
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(resizeMap, 150);
    });
    </script>

  </body>
</html>
