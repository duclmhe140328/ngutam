<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ thống Tòa nhà Interactive PRO | Ngự Tâm Holdings</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@600;700;800&display=swap"
      rel="stylesheet">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- CSS VARIABLES (TÔNG MÀU NGỰ TÂM) --- */
        :root {
            --bg-dark: #050507;
            --bg-panel: rgba(15, 12, 12, 0.75);
            --accent-gold: #D4AF37;
            --text-main: #e0e0e0;
            --glow-gold: 0 0 20px rgba(212, 175, 55, 0.4);
            --gradient-ai: linear-gradient(135deg, #D4AF37 0%, #ffdf73 50%, #D4AF37 100%);
        }

        /* --- GLOBAL --- */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                radial-gradient(circle at top left, rgba(139,0,0,0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom right, rgba(212,175,55,0.1) 0%, transparent 40%);
            background-size: 30px 30px, 30px 30px, 100% 100%, 100% 100%;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }

        /* --- LAYOUT CHÍNH --- */
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            padding: 15px;
            gap: 15px;
        }

        /* --- CỘT TRÁI (TÒA NHÀ & BẢN ĐỒ) --- */
        .left {
            width: 35%;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
        }

        .hud-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(212,175,55,0.15), transparent);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }
        .hud-header i { font-size: 14px; animation: blink 2s infinite; }

        .image-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .scanner-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent-gold);
            box-shadow: 0 0 20px 8px rgba(212, 175, 55, 0.4);
            opacity: 0.8;
            z-index: 5;
            pointer-events: none;
            animation: scan 3.5s ease-in-out infinite alternate;
        }

        .left img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            display: block;
            border-radius: 8px;
            z-index: 2;
            position: relative;
        }

        area { cursor: pointer; outline: none; }

        .instruction-badge {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 5, 7, 0.85);
            backdrop-filter: blur(10px);
            color: var(--accent-gold);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: var(--glow-gold);
            pointer-events: none;
            z-index: 10;
            animation: float 3s ease-in-out infinite;
            white-space: nowrap;
        }

        /* --- CỘT PHẢI (HIỂN THỊ WEB) --- */
        .right {
            width: 65%;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Đổi thành Flexbox để tách thanh điều khiển và iframe */
            display: flex;
            flex-direction: column;
        }

        /* Trạng thái Phóng to toàn màn hình */
        .right.full {
            position: fixed;
            top: 0; left: 0;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0;
            border: none;
            z-index: 9999;
            background: var(--bg-dark); /* Tránh bị chói khi full màn */
        }

        /* --- THANH ĐIỀU KHIỂN RIÊNG Ở TRÊN CÙNG (KHÔNG NẰM TRONG IFRAME) --- */
        .right-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(-90deg, rgba(212,175,55,0.15), transparent);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 10;
            flex-shrink: 0; /* Đảm bảo thanh này không bị ép nhỏ */
        }

        .right-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .right-title i { color: var(--accent-gold); }

        .btn-full {
            position: relative; /* Nút giờ nằm trong flow chuẩn, không trôi dạt nữa */
            background: rgba(5, 5, 7, 0.85);
            color: var(--accent-gold);
            padding: 8px 18px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }
        
        .btn-full::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(212,175,55,0.4), transparent);
            transform: skewX(-25deg); transition: 0s;
        }
        
        .btn-full:hover, .btn-full:active {
            background: var(--gradient-ai);
            color: #111;
            border-color: transparent;
            box-shadow: var(--glow-gold);
            transform: translateY(-2px); 
        }
        .btn-full:hover::before { animation: shine-sweep 1s; }

        /* --- VÙNG BỌC IFRAME (CHIẾM PHẦN DIỆN TÍCH CÒN LẠI DƯỚI THANH ĐIỀU KHIỂN) --- */
        .iframe-wrapper {
            position: relative;
            flex: 1; /* Tự động dãn đầy chiều cao còn lại */
            width: 100%;
            background: #fff; /* Nền trắng cho web/video call bên trong */
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* --- MÀN HÌNH CHỜ LUXURY --- */
        .placeholder {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle, rgba(20,20,25,0.95) 0%, var(--bg-dark) 100%);
            z-index: 10;
            transition: opacity 0.6s ease;
        }
        
        .placeholder-icon {
            font-size: 4.5rem;
            color: transparent;
            background: var(--gradient-ai);
            -webkit-background-clip: text;
            background-clip: text;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.4));
            animation: pulse-icon 2s infinite alternate;
        }

        .placeholder h2 {
            margin: 0 0 15px 0;
            font-size: 1.6rem;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .placeholder p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            max-width: 80%;
            line-height: 1.6;
        }

        /* LOADER KHI IFRAME ĐANG TẢI */
        .iframe-loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 8;
            display: none;
        }

        /* --- KHUNG IFRAME --- */
        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0; 
            transition: opacity 0.8s ease-in-out;
            z-index: 9;
        }
        iframe.loaded {
            opacity: 1;
        }

        /* --- HIỆU ỨNG ANIMATION --- */
        @keyframes scan {
            0% { top: 5%; opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { top: 95%; opacity: 0; }
        }
        @keyframes float {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -10px); box-shadow: 0 15px 30px rgba(212,175,55,0.6); }
        }
        @keyframes pulse-icon {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
            100% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(212,175,55,0.8)); }
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes shine-sweep { 0% { left: -100%; } 100% { left: 200%; } }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* --- RESPONSIVE MOBILE --- */
        @media(max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 10px;
                gap: 10px;
            }
            .left {
                width: 100%;
                flex: 0 0 45vh;
            }
            .right {
                width: 100%;
                flex: 1; 
            }
            .hud-header { padding: 10px 15px; font-size: 12px; }
            .placeholder h2 { font-size: 1.3rem; }
            .placeholder-icon { font-size: 3.5rem; }
            
            .right-controls {
                padding: 8px 15px;
            }
            .right-title { font-size: 11px; }
            .btn-full {
                padding: 6px 12px;
                font-size: 10px;
            }
            
            .instruction-badge {
                bottom: 10px;
                padding: 8px 15px;
                font-size: 10px;
            }
        }
    </style>
  </head>
  <body>

    <div class="container">

      <div class="left" id="leftBox">
        <div class="hud-header">
          <i class="fas fa-circle" style="color: #10b981;"></i>
          NGỰ TÂM TOWER // KẾT NỐI HỆ THỐNG
        </div>

        <div class="image-wrapper">
          <div class="scanner-line"></div>
          <img id="buildingImg" src="../1.jpeg" usemap="#building" alt="Ngu Tam Tower">
          <div class="instruction-badge"><i class="fas fa-crosshairs"></i> CHẠM VÀO TẦNG ĐỂ TRUY CẬP</div>
        </div>

        <map name="building">
          <area shape="rect" coords="146,680,737,852" onclick="loadFloor('https://a90b-14-248-228-25.ngrok-free.app/ngutam/upload/index.php')" href="#" title="Tầng 1 - Ngự Mộc Market">
          <area shape="rect" coords="160,660,732,601" onclick="loadFloor('#')" href="#" title="Tầng 2 - Ngự Tâm thiền trà">
          <area shape="rect" coords="154,524,732,586" onclick="loadFloor('https://tramxonghanhphuc.net')" href="#" title="Tầng 3 - Ngự Tâm Spa">
          <area shape="rect" coords="155,444,734,506" onclick="loadFloor('https://legatalk.io.vn')" href="#" title="Tầng 4 - Ngự Tâm Academy">
          <area shape="rect" coords="156,357,733,430" onclick="loadFloor('#')" href="#" title="Tầng 5 - Ngự Tâm Travel & Living">
          <area shape="rect" coords="156,278,734,333" onclick="loadFloor('#')" href="#" title="Tầng 6 - Ngự Tâm Mobility & Logistic">
          <area shape="rect" coords="154,173,734,258" onclick="loadFloor('https://a90b-14-248-228-25.ngrok-free.app/course/wordpress/')" href="#" title="Tầng 7 - Ngự Tâm Media & Technology">
        </map>
      </div>

      <div class="right" id="rightBox">
        
        <div class="right-controls">
            <div class="right-title"><i class="fas fa-satellite-dish"></i> TRUNG TÂM DỮ LIỆU</div>
            <button class="btn-full" id="fullBtn" onclick="toggleFull()">
              <i class="fas fa-expand"></i> Phóng to
            </button>
        </div>

        <div class="iframe-wrapper">
            <div class="iframe-loader" id="iframeLoader"></div>

            <div class="placeholder" id="placeholder">
            <i class="fas fa-fingerprint placeholder-icon"></i>
            <h2>Hệ thống chờ lệnh</h2>
            <p>Vui lòng tương tác với mô hình tháp bên trái để truy xuất không gian hiển thị.</p>
            </div>

            <iframe id="viewer"
            allow="camera; microphone; display-capture; fullscreen; clipboard-read; clipboard-write; autoplay; web-share"
            sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-top-navigation-by-user-activation allow-downloads">
            </iframe>
        </div>

      </div>

    </div>

    <script>
    let isFull = false;

    function loadFloor(url) {
        event.preventDefault();

        if(url === "#") {
            alert("Tầng này hiện chưa được thiết lập dữ liệu kết nối!");
            return;
        }
        
        const placeholder = document.getElementById("placeholder");
        const viewer = document.getElementById("viewer");
        const loader = document.getElementById("iframeLoader");
        
        if (window.innerWidth <= 768 && !isFull) {
            toggleFull();
        }

        placeholder.style.opacity = "0";
        loader.style.display = "block";
        viewer.classList.remove("loaded");

        setTimeout(() => {
            placeholder.style.display = "none";
            viewer.src = url;
            viewer.onload = function() {
                loader.style.display = "none";
                viewer.classList.add("loaded");
            };
        }, 500);
    }

    function toggleFull() {
        const right = document.getElementById("rightBox");
        const btn = document.getElementById("fullBtn");

        isFull = !isFull;

        if(isFull) {
            right.classList.add("full");
            btn.innerHTML = '<i class="fas fa-compress"></i> Thu nhỏ';
            setTimeout(resizeMap, 500);
        } else {
            right.classList.remove("full");
            btn.innerHTML = '<i class="fas fa-expand"></i> Phóng to';
            setTimeout(resizeMap, 500);
        }
    }

    function resizeMap() {
        const img = document.getElementById("buildingImg");
        const areas = document.querySelectorAll("area");

        if (!img.naturalWidth) return;

        const naturalWidth = img.naturalWidth;
        const naturalHeight = img.naturalHeight;

        const currentWidth = img.clientWidth;
        const currentHeight = img.clientHeight;

        const scaleX = currentWidth / naturalWidth;
        const scaleY = currentHeight / naturalHeight;

        areas.forEach(area => {
            if(!area.dataset.originalCoords){
                area.dataset.originalCoords = area.coords;
            }

            const coords = area.dataset.originalCoords.split(",");
            const newCoords = coords.map((coord, i) => {
                return i % 2 === 0 
                    ? Math.round(coord * scaleX) 
                    : Math.round(coord * scaleY);
            });

            area.coords = newCoords.join(",");
        });
    }

    document.getElementById("buildingImg").addEventListener('load', resizeMap);
    window.addEventListener("resize", () => {
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(resizeMap, 100);
    });
    </script>

  </body>
</html>
